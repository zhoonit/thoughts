<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lectures</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 4rem 2rem;
    }
    .container { max-width: 600px; width: 100%; }
    h1 { font-size: 2rem; margin-bottom: 2rem; font-weight: 700; }
    .projects { list-style: none; }
    .project {
      padding: 1.5rem;
      margin-bottom: 1rem;
      background: #1e1e1e;
      border-radius: 0.5rem;
      border: 1px solid #3f3f46;
    }
    .project h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
    .links { display: flex; gap: 1rem; }
    .links a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lectures</h1>
    <ul class="projects">
      
      <li class="project">
        <h2>Sense Of Engineering</h2>
        <div class="links">
          <a href="/sense-of-engineering/notes/">Notes</a>
          <a href="/sense-of-engineering/slides/">Slides</a>
        </div>
      </li>
    </ul>
  </div>
</body>
</html>
